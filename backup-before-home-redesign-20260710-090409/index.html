<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#183f34">
  <title>JulesTube premium</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/julestube-intro.css">
</head>
<body>
  <div id="jt-intro" aria-label="JulesTube Intro">
    <video
      id="jt-intro-video"
      autoplay
      muted
      playsinline
      preload="auto"
      src="/static/assets/julestube-premium-intro.mp4"
    ></video>

    <button id="jt-intro-skip" class="jt-intro-control" type="button">
      Überspringen
    </button>

    <button
      id="jt-intro-sound"
      class="jt-intro-control"
      type="button"
      aria-pressed="false"
    >
      Ton einschalten
    </button>
  </div>

  <header class="site-header">
    <a class="menu-button" href="#dashboard" aria-label="Zum Player und zur Warteschlange">
      <span></span>
      <span></span>
      <span></span>
    </a>

    <span class="signin" aria-label="Anmeldung folgt in einer späteren Etappe">
      SIGN IN
    </span>
  </header>

  <main>
    <section class="landing" aria-labelledby="brand-title">
      <div class="brand-lockup">
        <div class="play-mark" aria-hidden="true">
          <span></span>
        </div>

        <div class="wordmark">
          <h1 id="brand-title">JulesTube</h1>
          <p>premium</p>
        </div>
      </div>

      <form id="search-form" class="hero-search" role="search">
        <label class="sr-only" for="search-input">Musik suchen</label>
        <input
          id="search-input"
          type="search"
          placeholder="Song, Video oder Kanal suchen"
          autocomplete="off"
        >
        <button type="submit" aria-label="Suche starten">
          <span aria-hidden="true">➤</span>
        </button>
      </form>

      <p id="message" class="message" aria-live="polite"></p>

      <p class="tagline">Your couch. Your music. Your rules.</p>
    </section>

    <section id="dashboard" class="dashboard" aria-label="JulesTube Steuerung">
      <section class="panel now-playing">
        <p class="eyebrow">JulesTube · Now playing</p>
        <h2>Aktuell</h2>
        <p id="now-title">Noch nichts gestartet</p>
        <p id="now-meta"></p>

        <div class="controls">
          <button id="pause-btn" type="button">⏯ Play/Pause</button>
          <button id="next-btn" type="button">⏭ Weiter</button>
        </div>

        <label class="volume-label">
          <span>🔊 Lautstärke</span>
          <input id="volume" type="range" min="0" max="100" value="70">
        </label>
      </section>

      <section class="panel results-panel">
        <p class="eyebrow">Discover</p>
        <h2>Suchergebnisse</h2>
        <div id="results" class="results">
          <p class="empty">Starte oben deine erste Suche.</p>
        </div>
      </section>

      <section class="panel queue-panel">
        <p class="eyebrow">Up next</p>
        <h2>Warteschlange</h2>
        <ol id="queue" class="queue"></ol>
      </section>
    </section>
  </main>

  <script src="/static/julestube-intro.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
