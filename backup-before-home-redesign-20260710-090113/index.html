<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SofaJukebox</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/julestube-intro.css">
</head>
<body>
  <div id="jt-intro" aria-label="JulesTube Intro">
    <video
      id="jt-intro-video"
      autoplay
      muted
      playsinline
      preload="auto"
      src="/static/assets/julestube-premium-intro.mp4"
    ></video>
    <button id="jt-intro-skip" class="jt-intro-control" type="button">
      Überspringen
    </button>
    <button
      id="jt-intro-sound"
      class="jt-intro-control"
      type="button"
      aria-pressed="false"
    >
      Ton einschalten
    </button>
  </div>

  <main class="shell">
    <header class="hero">
      <p class="eyebrow">JulesTube · Etappe 1</p>
      <h1>SofaJukebox</h1>
      <p>Suche am Handy. Spiel auf dem Linux-PC. Kein Cast-Zauber, nur sauberes lokales Werkzeug.</p>
    </header>

    <section class="panel now-playing">
      <h2>Aktuell</h2>
      <p id="now-title">Noch nichts gestartet</p>
      <p id="now-meta"></p>
      <div class="controls">
        <button id="pause-btn">⏯️ Play/Pause</button>
        <button id="next-btn">⏭️ Weiter</button>
      </div>
      <label class="volume-label">
        🔊 Lautstärke
        <input id="volume" type="range" min="0" max="100" value="70">
      </label>
    </section>

    <section class="panel">
      <h2>Suche</h2>
      <form id="search-form" class="search-row">
        <input id="search-input" type="search" placeholder="Song, Video oder Kanal suchen" autocomplete="off">
        <button>Suchen</button>
      </form>
      <p id="message" class="message"></p>
      <div id="results" class="results"></div>
    </section>

    <section class="panel">
      <h2>Warteschlange</h2>
      <ol id="queue" class="queue"></ol>
    </section>
  </main>

  <script src="/static/julestube-intro.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
